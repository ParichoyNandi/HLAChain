<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Storage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Simple Storage on Blockchain</h1>
        <div class="form-group">
            <input type="number" id="inputValue" placeholder="Enter a value to store">
            <button onclick="setStorage()">Set Value</button>
        </div>
        <div class="form-group">
            <button onclick="getStorage()">Get Value</button>
        </div>
        <p id="output"></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/web3/dist/web3.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
